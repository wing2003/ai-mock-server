{% extends "base.html" %}

{% block content %}
<div class="flex justify-between items-center mb-6">
    <div>
        <h2 class="text-2xl font-bold text-gray-700">{{ pool.name }} - Key 管理</h2>
        <p class="text-sm text-gray-500">{{ pool.description or '暂无描述' }}</p>
    </div>
    <a href="/admin/pools" class="text-blue-500 hover:underline">返回池列表</a>
</div>

<!-- 批量操作栏 -->
<div class="bg-white p-4 rounded-lg shadow-md mb-6 flex items-center space-x-4">
    <form action="/admin/pools/{{ pool.id }}/keys/generate" method="post" class="flex items-center space-x-2">
        <input type="number" name="count" value="10" min="1" max="500" class="border p-2 rounded w-24" placeholder="数量">
        <input type="text" name="prefix" value="sk-" class="border p-2 rounded w-24" placeholder="前缀">
        <input type="number" name="balance" value="0" step="0.01" class="border p-2 rounded w-32" placeholder="初始余额">
        <button type="submit" class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded">
            批量生成
        </button>
    </form>
</div>

<!-- Key 列表表格 -->
<div class="bg-white shadow-md rounded-lg overflow-hidden">
    <table class="min-w-full leading-normal">
        <thead>
            <tr>
                <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">API Key</th>
                <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">状态</th>
                <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">余额</th>
                <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">累计请求</th>
                <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-right text-xs font-semibold text-gray-600 uppercase tracking-wider">操作</th>
            </tr>
        </thead>
        <tbody>
            {% for key in keys %}
            <tr>
                <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm font-mono">
                    {{ key.api_key }}
                </td>
                <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                    <form action="/admin/pools/keys/update-status/{{ key.id }}" method="post" class="inline">
                        <select name="status" onchange="this.form.submit()" class="border rounded p-1 text-xs 
                            {% if key.status == 'active' %}text-green-600
                            {% elif key.status == 'banned' %}text-red-600
                            {% elif key.status == 'ip_risk' %}text-orange-600
                            {% else %}text-yellow-600{% endif %}">
                            <option value="active" {% if key.status == 'active' %}selected{% endif %}>有效</option>
                            <option value="temp_limited" {% if key.status == 'temp_limited' %}selected{% endif %}>临时限流</option>
                            <option value="ip_risk" {% if key.status == 'ip_risk' %}selected{% endif %}>IP关联风险</option>
                            <option value="banned" {% if key.status == 'banned' %}selected{% endif %}>永久封禁</option>
                            <option value="expired" {% if key.status == 'expired' %}selected{% endif %}>已过期</option>
                        </select>
                    </form>
                </td>
                <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                    <form action="/admin/pools/keys/update-balance/{{ key.id }}" method="post" class="inline-flex items-center space-x-1">
                        <input type="number" name="balance" value="{{ key.balance }}" step="0.01" class="border rounded p-1 w-24 text-xs">
                        <button type="submit" class="text-blue-600 hover:text-blue-900 text-xs">保存</button>
                    </form>
                </td>
                <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                    <div class="flex items-center space-x-2">
                        <span>{{ key.total_requests }}</span>
                        <form action="/admin/pools/keys/reset-count/{{ key.id }}" method="post">
                            <button type="submit" class="text-gray-500 hover:text-gray-700 text-xs border px-1 rounded" title="重置计数">↺</button>
                        </form>
                    </div>
                </td>
                <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm text-right">
                    <form action="/admin/pools/keys/delete/{{ key.id }}" method="post" class="inline" onsubmit="return confirm('确定删除该 Key 吗？');">
                        <button type="submit" class="text-red-600 hover:text-red-900">删除</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% if not keys %}
    <div class="p-8 text-center text-gray-500">
        该池中还没有 API Key，请使用上方表单批量生成。
    </div>
    {% endif %}
</div>
{% endblock %}
