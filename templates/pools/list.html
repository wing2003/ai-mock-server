{% extends "base.html" %}

{% block content %}
<div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold text-gray-700">Key 池管理</h2>
    <button onclick="document.getElementById('create-pool-modal').classList.remove('hidden')" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
        新建 Key 池
    </button>
</div>

<!-- 新建 Key 池弹窗 -->
<div id="create-pool-modal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center">
    <div class="bg-white p-6 rounded-lg shadow-xl w-96">
        <h3 class="text-lg font-bold mb-4">新建 Key 池</h3>
        <form action="/admin/pools/create" method="post">
            <input type="text" name="name" placeholder="池名称" required class="w-full border p-2 mb-3 rounded">
            <textarea name="description" placeholder="描述" class="w-full border p-2 mb-3 rounded"></textarea>
            <div class="flex justify-end space-x-2">
                <button type="button" onclick="document.getElementById('create-pool-modal').classList.add('hidden')" class="px-4 py-2 text-gray-600">取消</button>
                <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded">创建</button>
            </div>
        </form>
    </div>
</div>

<div class="bg-white shadow-md rounded-lg overflow-hidden">
    <table class="min-w-full leading-normal">
        <thead>
            <tr>
                <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                    池名称
                </th>
                <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                    描述
                </th>
                <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                    创建时间
                </th>
                <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-right text-xs font-semibold text-gray-600 uppercase tracking-wider">
                    操作
                </th>
            </tr>
        </thead>
        <tbody>
            {% for pool in pools %}
            <tr>
                <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                    <p class="text-gray-900 whitespace-no-wrap">{{ pool.name }}</p>
                </td>
                <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                    <p class="text-gray-900 whitespace-no-wrap">{{ pool.description or '-' }}</p>
                </td>
                <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                    <p class="text-gray-900 whitespace-no-wrap">{{ pool.created_at.strftime('%Y-%m-%d %H:%M') }}</p>
                </td>
                <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm text-right">
                    <a href="/admin/pools/{{ pool.id }}/keys" class="text-blue-600 hover:text-blue-900 mr-3">管理 Keys</a>
                    <form action="/admin/pools/delete/{{ pool.id }}" method="post" class="inline" onsubmit="return confirm('确定删除该池吗？');">
                        <button type="submit" class="text-red-600 hover:text-red-900">删除</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
